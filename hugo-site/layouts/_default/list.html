{{ define "main" }}
<h2>{{ if .IsHome }}文章列表{{ else }}{{ .Title }}{{ end }}</h2>
<ul>
  {{ range .Site.RegularPages.ByDate.Reverse }}
  <li>
    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    <span class="meta"> · {{ .Date.Format "2006-01-02" }}</span>
  </li>
  {{ else }}
  <li class="meta">当前没有可发布文章。</li>
  {{ end }}
</ul>
{{ end }}

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --border: #cbd5e1;
      --link: #0f766e;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.7;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    a {
      color: var(--link);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    h1, h2, h3 {
      line-height: 1.3;
    }
    code {
      background: #eef2ff;
      padding: 0 4px;
      border-radius: 4px;
    }
    pre code {
      display: block;
      padding: 12px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <header>
        <h1><a href="/">{{ .Site.Title }}</a></h1>
      </header>
      <main>
        {{ block "main" . }}{{ end }}
      </main>
    </div>
  </div>
</body>
</html>

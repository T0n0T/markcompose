services:
  hugo-builder:
    image: docker.io/hugomods/hugo:dart-sass-non-root
    working_dir: /site
    environment:
      - HUGO_ASSETS_DIR=${ASSETS_DIR:-_assets}
    volumes:
      - ${MARKDOWN_DIR:?MARKDOWN_DIR is required}:/markdown:ro
      - ./hugo-site:/site
      - hugo_public:/public
    command:
      - hugo
      - --source
      - /site
      - --contentDir
      - /markdown
      - --destination
      - /public
      - --cleanDestinationDir

  waline:
    image: lizheming/waline:latest
    environment:
      - SQLITE_PATH=/app/data
      - JWT_TOKEN=${WALINE_JWT_TOKEN:-change-this-jwt-token}
      - SITE_NAME=${WALINE_SITE_NAME:-Blog Comments}
      - SITE_URL=${WALINE_SITE_URL:-}
      - SERVER_URL=${WALINE_SERVER_URL:-}
    volumes:
      - waline_data:/app/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      - waline
    ports:
      - ${HOST_PORT:-8080}:80
      - ${EDITOR_PORT:-8081}:81
    volumes:
      - hugo_public:/var/www/blog:ro
      - ${EDITOR_STATIC_DIR:?EDITOR_STATIC_DIR is required}:/var/www/editor:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  hugo_public:
  waline_data:

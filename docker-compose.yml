services:
  hugo-builder:
    image: docker.io/hugomods/hugo:dart-sass
    working_dir: /site
    volumes:
      - ${MARKDOWN_DIR:-./_markdown_not_set}:/markdown:ro
      - ./hugo-site:/site
      - hugo_public:/public
    command:
      - hugo
      - --source
      - /site
      - --contentDir
      - /markdown
      - --destination
      - /public
      - --cleanDestinationDir

  nginx:
    image: nginx:alpine
    depends_on: []
    ports:
      - ${HOST_PORT:-8080}:80
      - ${EDITOR_PORT:-8081}:81
    volumes:
      - hugo_public:/var/www/blog:ro
      - ${EDITOR_STATIC_DIR:-./_editor_not_set}:/var/www/editor:ro
      - ${ATTACHMENTS_DIR:-./_attachments_not_set}:/var/www/attachments:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  hugo_public:
